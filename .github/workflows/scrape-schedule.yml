name: Scrape BTCC Session Schedule

on:
  schedule:
    # Nightly at 07:00 UTC — picks up any time updates btcc.net publish overnight
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  scrape:
    # btcc.net's hosting WAF blocks GitHub-hosted runner IPs entirely (2026-07-11,
    # see project_btcc_waf_ip_block memory) - runs on a self-hosted runner instead.
    # That runner is macOS, so the Ubuntu-only apt-get audio dep is dropped below;
    # Playwright doesn't need it there.
    runs-on: [self-hosted, btcc-local]
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          pip3 install -r tools/scraper/requirements.txt
          python3 -m playwright install chromium

      - name: Scrape session schedule
        run: python3 tools/scraper/scrape_schedule.py

      - name: Merge sessions into app calendar
        run: python3 tools/scraper/merge_schedule.py

      - name: Commit updated schedule
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: update session schedule from btcc.net [skip ci]"
          file_pattern: data/schedule.json data/calendar.json
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"

      - name: Report failure
        if: failure()
        env:
          SCRAPER_SECRET: ${{ secrets.SCRAPER_SECRET }}
        run: |
          curl -sf -X POST \
            -H "Content-Type: application/json" \
            -H "x-scraper-secret: ${SCRAPER_SECRET}" \
            -d "{\"workflow\":\"scrape-schedule\",\"message\":\"Session schedule scrape failed\",\"runUrl\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "https://us-central1-btcchub-af77a.cloudfunctions.net/reportScraperFailure" || echo "Failure report failed (non-fatal)"
