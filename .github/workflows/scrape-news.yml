# Runs the news scraper on a schedule so the sendSessionNotifications Cloud
# Function can read the latest btcc.net article from GitHub instead of
# hitting btcc.net directly at runtime (blocked at runtime - see below).
name: Scrape BTCC News

on:
  schedule:
    # Every 5 minutes - keeps notification lag close to the previous
    # live-check behaviour. Runs on a self-hosted runner (see below) since
    # btcc.net's hosting WAF blocks GitHub-hosted runner IPs entirely.
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: scrape-news
  cancel-in-progress: false

jobs:
  scrape:
    # btcc.net's hosting WAF blocks GitHub-hosted runner IPs entirely (2026-07-11,
    # see project_btcc_waf_ip_block memory) - runs on a self-hosted runner instead.
    runs-on: [self-hosted, btcc-local]
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Pull latest
        run: git pull --rebase origin main

      - name: Install dependencies
        run: pip3 install curl_cffi

      - name: Scrape news
        run: python3 tools/scraper/scrape_news.py

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: update news from btcc.net [skip ci]"
          file_pattern: data/news.json
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          push_options: "--force-with-lease"

      - name: Report failure
        if: failure()
        env:
          SCRAPER_SECRET: ${{ secrets.SCRAPER_SECRET }}
        run: |
          curl -sf -X POST \
            -H "Content-Type: application/json" \
            -H "x-scraper-secret: ${SCRAPER_SECRET}" \
            -d "{\"workflow\":\"scrape-news\",\"message\":\"News scrape failed\",\"runUrl\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "https://us-central1-btcchub-af77a.cloudfunctions.net/reportScraperFailure" || echo "Failure report failed (non-fatal)"
