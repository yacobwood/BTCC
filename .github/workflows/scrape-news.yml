# Runs the news scraper on a schedule so the sendSessionNotifications Cloud
# Function can read the latest btcc.net article from GitHub instead of
# hitting btcc.net directly at runtime (blocked at runtime - see below).
name: Scrape BTCC News

on:
  # Schedule disabled 2026-07-11: btcc.net's hosting-level WAF (not Cloudflare -
  # response headers show openresty/LiteSpeed, no cf-ray) is blocking ALL
  # requests (even plain curl, no TLS impersonation) from GitHub Actions' IP
  # range with a 403. Confirmed this also breaks scrape-calendar.yml, which is
  # unrelated and unchanged. This is an IP-reputation block, not a fingerprint
  # one - curl_cffi cannot fix it. Re-enable the cron below once resolved - see
  # project_scraper_reliability_audit memory / ask Claude for context.
  # schedule:
  #   - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: scrape-news
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Pull latest
        run: git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install curl_cffi

      - name: Scrape news
        run: python tools/scraper/scrape_news.py

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: update news from btcc.net [skip ci]"
          file_pattern: data/news.json
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          push_options: "--force-with-lease"

      - name: Report failure
        if: failure()
        env:
          SCRAPER_SECRET: ${{ secrets.SCRAPER_SECRET }}
        run: |
          curl -sf -X POST \
            -H "Content-Type: application/json" \
            -H "x-scraper-secret: ${SCRAPER_SECRET}" \
            -d "{\"workflow\":\"scrape-news\",\"message\":\"News scrape failed\",\"runUrl\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "https://us-central1-btcchub-af77a.cloudfunctions.net/reportScraperFailure" || echo "Failure report failed (non-fatal)"
