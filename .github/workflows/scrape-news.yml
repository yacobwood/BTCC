# Runs the news scraper on a schedule so the sendSessionNotifications Cloud
# Function can read the latest btcc.net article from GitHub instead of
# hitting btcc.net directly at runtime (Cloudflare blocks that).
name: Scrape BTCC News

on:
  # Schedule disabled 2026-07-11: btcc.net/Cloudflare started blocking curl_cffi
  # requests from GitHub Actions' IP range entirely (403 on every path, not just
  # this one - scrape-calendar.yml hits the same block despite being unrelated
  # and unchanged). Re-enable the cron below once that access issue is resolved -
  # see project_scraper_reliability_audit memory / ask Claude for context.
  # schedule:
  #   - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: scrape-news
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Pull latest
        run: git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install curl_cffi

      - name: Debug fetch (temporary diagnostic)
        continue-on-error: true
        run: |
          python3 -c "
          from curl_cffi import requests as r
          resp = r.get('https://www.btcc.net/news/', impersonate='chrome120', timeout=15)
          print('STATUS:', resp.status_code)
          print('HEADERS:')
          for k, v in resp.headers.items():
              print(f'  {k}: {v}')
          print('BODY (first 1500 chars):')
          print(resp.text[:1500])
          "
          echo '--- plain curl for comparison ---'
          curl -sv -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" https://www.btcc.net/news/ -o /tmp/plain.html 2>&1 | tail -30
          echo '--- plain curl body head ---'
          head -c 1000 /tmp/plain.html

      - name: Scrape news
        run: python tools/scraper/scrape_news.py

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: update news from btcc.net [skip ci]"
          file_pattern: data/news.json
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          push_options: "--force-with-lease"

      - name: Report failure
        if: failure()
        env:
          SCRAPER_SECRET: ${{ secrets.SCRAPER_SECRET }}
        run: |
          curl -sf -X POST \
            -H "Content-Type: application/json" \
            -H "x-scraper-secret: ${SCRAPER_SECRET}" \
            -d "{\"workflow\":\"scrape-news\",\"message\":\"News scrape failed\",\"runUrl\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "https://us-central1-btcchub-af77a.cloudfunctions.net/reportScraperFailure" || echo "Failure report failed (non-fatal)"
