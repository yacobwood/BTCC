name: Scrape BTCC Grid

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r tools/scraper/requirements.txt requests Pillow
          sudo apt-get install -y libasound2t64
          playwright install chromium --with-deps

      - name: Scrape grid
        run: python tools/scraper/scrape_grid.py --merge

      - name: Download and optimise driver images
        run: |
          COUNT=$(python -c "import json; d=json.load(open('data/grid_scraped.json')) if __import__('os').path.exists('data/grid_scraped.json') else {}; print(len(d.get('drivers', [])))")
          echo "Scraped driver count: $COUNT"
          if [ "$COUNT" -gt 0 ]; then
            python scripts/download_driver_images.py
          else
            echo "No drivers scraped — skipping image download"
          fi

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update grid and driver images from btcc.net [skip ci]"
          file_pattern: |
            data/drivers.json
            data/grid_scraped.json
            app/src/main/assets/driver_images/*.webp
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
