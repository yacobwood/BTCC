# Runs the calendar scraper on a schedule. Picks up new calendar data
# automatically when btcc.net publishes it.
name: Scrape BTCC Calendar

on:
  schedule:
    # Daily 09:00 UTC.
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      season:
        description: "Season year (e.g. 2026)"
        type: number
        default: 2026

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install playwright
          sudo apt-get install -y libasound2t64
          playwright install chromium --with-deps

      - name: Scrape calendar
        run: |
          SEASON="${{ github.event.inputs.season }}"
          [ -z "$SEASON" ] && SEASON=2026
          python tools/scraper/scrape_calendar.py --season "$SEASON"

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: update calendar from btcc.net [skip ci]"
          file_pattern: data/calendar.json
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
