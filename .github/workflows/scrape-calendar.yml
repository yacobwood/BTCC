# Runs the calendar scraper on a schedule. Picks up new calendar data
# automatically when btcc.net publishes it.
name: Scrape BTCC Calendar

on:
  schedule:
    # Daily 09:00 UTC.
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      season:
        description: "Season year (e.g. 2026)"
        type: number
        default: 2026

jobs:
  scrape:
    # btcc.net's hosting WAF blocks GitHub-hosted runner IPs entirely (2026-07-11,
    # see project_btcc_waf_ip_block memory) - runs on a self-hosted runner instead.
    runs-on: [self-hosted, btcc-local]
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Install dependencies
        run: pip3 install curl_cffi

      - name: Scrape calendar
        run: |
          SEASON="${{ github.event.inputs.season }}"
          [ -z "$SEASON" ] && SEASON=2026
          python3 tools/scraper/scrape_calendar.py --season "$SEASON"

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: update calendar from btcc.net [skip ci]"
          file_pattern: data/calendar.json
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"

      - name: Report failure
        if: failure()
        env:
          SCRAPER_SECRET: ${{ secrets.SCRAPER_SECRET }}
        run: |
          curl -sf -X POST \
            -H "Content-Type: application/json" \
            -H "x-scraper-secret: ${SCRAPER_SECRET}" \
            -d "{\"workflow\":\"scrape-calendar\",\"message\":\"Calendar scrape failed\",\"runUrl\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "https://us-central1-btcchub-af77a.cloudfunctions.net/reportScraperFailure" || echo "Failure report failed (non-fatal)"
