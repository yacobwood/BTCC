# Runs calendar + grid scrapers on a schedule. You don't need to know when
# BTCC announce the calendar — the next run will pick it up when btcc.net updates.
name: Scrape BTCC Calendar & Grid

on:
  schedule:
    # Daily 09:00 UTC. When btcc.net publish the new calendar, it'll be in the repo within a day.
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      season:
        description: "Season year for calendar (e.g. 2026)"
        type: number
        default: 2026
      merge_grid:
        description: "Also scrape drivers and merge into drivers.json"
        type: boolean
        default: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r tools/scraper/requirements.txt
          sudo apt-get install -y libasound2t64
          playwright install chromium --with-deps

      - name: Scrape calendar
        run: |
          SEASON="${{ github.event.inputs.season }}"
          [ -z "$SEASON" ] && SEASON=2026
          python tools/scraper/scrape_calendar.py --season "$SEASON"

      - name: Scrape grid (optional)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.merge_grid == 'true'
        run: python tools/scraper/scrape_grid.py --merge

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: update calendar from btcc.net [skip ci]"
          file_pattern: |
            data/calendar.json
            data/calendar_schedule.json
            data/drivers.json
            data/grid_scraped.json
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
