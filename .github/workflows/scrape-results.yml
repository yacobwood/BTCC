name: Scrape BTCC Results

on:
  schedule:
    # Every 2 min Sat/Sun 09:00–19:00 UTC — is_race_weekend.py gates execution
    # to per-session windows (session BST+15min → session BST+90min), skipping
    # sessions whose results are already committed. Stops as soon as each
    # session's data lands. Latest possible close: 19:00 UTC (R3 17:30 BST+90min).
    - cron: "*/2 9-19 * * 6"
    - cron: "*/2 9-19 * * 0"
  workflow_dispatch:
    inputs:
      year:
        description: "Season year to scrape (e.g. 2026)"
        type: number
        default: 2026
      round:
        description: "Specific round to scrape (leave blank for all)"
        type: number
      override_reverse_grid_draw:
        description: "Manually set Race 3 reverse-grid draw number (6-12) for the specified round. Use when TSL amended the grid PDF after the scrape window closed."
        type: number

concurrency:
  group: scrape-results
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Check race weekend
        id: raceday
        run: python .github/scripts/is_race_weekend.py

      - name: Pull latest before scraping
        if: |
          github.event_name == 'workflow_dispatch' ||
          steps.raceday.outputs.in_session_window == 'true'
        run: git pull --rebase origin main

      - name: Set up Python
        if: |
          github.event_name == 'workflow_dispatch' ||
          steps.raceday.outputs.in_session_window == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: |
          github.event_name == 'workflow_dispatch' ||
          steps.raceday.outputs.in_session_window == 'true'
        run: pip install pdfminer.six

      - name: Scrape results and compute standings
        id: scrape
        continue-on-error: true
        if: |
          github.event_name == 'workflow_dispatch' ||
          steps.raceday.outputs.in_session_window == 'true'
        run: |
          YEAR="${{ github.event.inputs.year }}"
          [ -z "$YEAR" ] && YEAR=2026
          ROUND="${{ github.event.inputs.round }}"
          DRAW="${{ github.event.inputs.override_reverse_grid_draw }}"
          ARGS="$YEAR"
          if [ -n "$ROUND" ]; then
            ARGS="$ARGS --round $ROUND"
          else
            ARGS="$ARGS --today"
          fi
          if [ -n "$DRAW" ]; then
            ARGS="$ARGS --set-draw $DRAW"
          fi
          python tools/scraper/scrape_tsl.py $ARGS

      - name: Pull latest before committing
        if: |
          github.event_name == 'workflow_dispatch' ||
          steps.raceday.outputs.in_session_window == 'true'
        run: git pull --rebase --autostash origin main

      - name: Commit updated data
        id: commit
        if: |
          github.event_name == 'workflow_dispatch' ||
          steps.raceday.outputs.in_session_window == 'true'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: update ${{ github.event.inputs.year || '2026' }} results [skip ci]"
          file_pattern: "data/results*.json data/standings.json"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          push_options: "--force-with-lease"

      - name: Notify app clients to refresh results cache
        if: steps.commit.outputs.changes_detected == 'true'
        env:
          SCRAPER_SECRET: ${{ secrets.SCRAPER_SECRET }}
          YEAR: ${{ github.event.inputs.year || '2026' }}
        run: |
          curl -sf -X POST \
            -H "Content-Type: application/json" \
            -H "x-scraper-secret: ${SCRAPER_SECRET}" \
            -d "{\"year\":\"${YEAR}\"}" \
            "https://us-central1-btcchub-af77a.cloudfunctions.net/notifyResultsUpdate" || echo "Notify failed (non-fatal)"

      # scrape_tsl.py already writes results/standings before compute_records or
      # team-stats can fail, so the commit step above still runs and saves the
      # good data even when the scrape step below reports failure. These two
      # steps only make sure that failure is still reported and the job/run
      # itself shows red, instead of the whole thing silently looking green.
      - name: Report failure
        if: steps.scrape.outcome == 'failure'
        env:
          SCRAPER_SECRET: ${{ secrets.SCRAPER_SECRET }}
        run: |
          curl -sf -X POST \
            -H "Content-Type: application/json" \
            -H "x-scraper-secret: ${SCRAPER_SECRET}" \
            -d "{\"workflow\":\"scrape-results\",\"message\":\"Results scrape failed (results/standings were still committed if produced) - see run log\",\"runUrl\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "https://us-central1-btcchub-af77a.cloudfunctions.net/reportScraperFailure" || echo "Failure report failed (non-fatal)"

      - name: Fail job if scrape step failed
        if: steps.scrape.outcome == 'failure'
        run: exit 1
