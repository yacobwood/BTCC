name: Scrape BTCC Results

on:
  schedule:
    # Saturday: run hourly 15:00–18:00 UTC to catch the Qualifying Race (~15:05 BST start).
    - cron: "0 15-18 * * 6"
    # Sunday: run hourly 10:00–18:00 UTC to catch Race 1 (~10:30 BST), Race 2 (~13:40 BST), Race 3 (~16:30 BST).
    - cron: "0 10-18 * * 0"
  workflow_dispatch:
    inputs:
      year:
        description: "Season year to scrape (e.g. 2026)"
        type: number
        default: 2026
      round:
        description: "Specific round to scrape (leave blank for all)"
        type: number

concurrency:
  group: scrape-results
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Check race weekend
        id: raceday
        run: python .github/scripts/is_race_weekend.py

      - name: Set up Python
        if: |
          github.event_name == 'workflow_dispatch' ||
          steps.raceday.outputs.is_race_weekend == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: |
          github.event_name == 'workflow_dispatch' ||
          steps.raceday.outputs.is_race_weekend == 'true'
        run: pip install pdfminer.six

      - name: Scrape results and compute standings
        if: |
          github.event_name == 'workflow_dispatch' ||
          steps.raceday.outputs.is_race_weekend == 'true'
        run: |
          YEAR="${{ github.event.inputs.year }}"
          [ -z "$YEAR" ] && YEAR=2026
          ROUND="${{ github.event.inputs.round }}"
          ARGS="$YEAR"
          [ -n "$ROUND" ] && ARGS="$ARGS --round $ROUND"
          python tools/scraper/scrape_tsl.py $ARGS

      - name: Commit updated data
        if: |
          github.event_name == 'workflow_dispatch' ||
          steps.raceday.outputs.is_race_weekend == 'true'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: update ${{ github.event.inputs.year || '2026' }} results [skip ci]"
          file_pattern: |
            data/results*.json
            data/standings.json
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
