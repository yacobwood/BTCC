name: Scrape BTCC Results

on:
  schedule:
    # Every 5 min Sat/Sun 09:00–18:00 UTC — is_race_weekend.py gates execution
    # to the actual session window (first session BST−5min → last session BST+90min).
    # Earliest window open: 09:05 UTC (BH GP FP 10:10 BST). Latest close: 18:00 UTC (R3 17:30 BST+90min).
    - cron: "*/5 9-18 * * 6"
    - cron: "*/5 9-18 * * 0"
  workflow_dispatch:
    inputs:
      year:
        description: "Season year to scrape (e.g. 2026)"
        type: number
        default: 2026
      round:
        description: "Specific round to scrape (leave blank for all)"
        type: number

concurrency:
  group: scrape-results
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Check race weekend
        id: raceday
        run: python .github/scripts/is_race_weekend.py

      - name: Set up Python
        if: |
          github.event_name == 'workflow_dispatch' ||
          steps.raceday.outputs.in_session_window == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: |
          github.event_name == 'workflow_dispatch' ||
          steps.raceday.outputs.in_session_window == 'true'
        run: pip install pdfminer.six

      - name: Scrape results and compute standings
        if: |
          github.event_name == 'workflow_dispatch' ||
          steps.raceday.outputs.in_session_window == 'true'
        run: |
          YEAR="${{ github.event.inputs.year }}"
          [ -z "$YEAR" ] && YEAR=2026
          ROUND="${{ github.event.inputs.round }}"
          ARGS="$YEAR"
          [ -n "$ROUND" ] && ARGS="$ARGS --round $ROUND"
          python tools/scraper/scrape_tsl.py $ARGS

      - name: Pull latest before commit
        if: |
          github.event_name == 'workflow_dispatch' ||
          steps.raceday.outputs.in_session_window == 'true'
        run: git pull --rebase --autostash origin main

      - name: Commit updated data
        if: |
          github.event_name == 'workflow_dispatch' ||
          steps.raceday.outputs.in_session_window == 'true'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: update ${{ github.event.inputs.year || '2026' }} results [skip ci]"
          file_pattern: |
            data/results*.json
            data/standings.json
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          push_options: "--force-with-lease"
