name: Scrape BTCC Official Stats

on:
  schedule:
    # Daily at 06:00 UTC — well outside race windows to avoid commit conflicts
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (print changes without writing)"
        type: boolean
        default: false

concurrency:
  group: scrape-btcc-stats
  cancel-in-progress: false

jobs:
  scrape:
    # btcc.net's hosting WAF blocks GitHub-hosted runner IPs entirely (2026-07-11,
    # see project_btcc_waf_ip_block memory) - runs on a self-hosted runner instead.
    runs-on: [self-hosted, btcc-local]
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Pull latest
        run: git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install curl_cffi

      - name: Run scraper
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="--dry-run"
          fi
          python tools/scraper/scrape_btcc_stats.py $ARGS

      - name: Commit updated records
        if: github.event.inputs.dry_run != 'true'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: update all-time records from btcc.net [skip ci]"
          file_pattern: "data/records.json"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          push_options: "--force-with-lease"

      - name: Report failure
        if: failure()
        env:
          SCRAPER_SECRET: ${{ secrets.SCRAPER_SECRET }}
        run: |
          curl -sf -X POST \
            -H "Content-Type: application/json" \
            -H "x-scraper-secret: ${SCRAPER_SECRET}" \
            -d "{\"workflow\":\"scrape-btcc-stats\",\"message\":\"Official stats scrape failed\",\"runUrl\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "https://us-central1-btcchub-af77a.cloudfunctions.net/reportScraperFailure" || echo "Failure report failed (non-fatal)"
