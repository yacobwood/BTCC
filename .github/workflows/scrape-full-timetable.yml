# Scrapes full weekend timetables (support series) from btcc.net circuit pages
# and updates fullTimetable in data/calendar.json.
# Runs weekly on Mondays — timetables are published weeks ahead of each round
# so weekly is sufficient to catch new data without hammering the site.
name: Scrape Full Timetables

on:
  schedule:
    # Every Monday 08:00 UTC.
    - cron: "0 8 * * 1"
  workflow_dispatch:
    inputs:
      round:
        description: "Specific round number to scrape (leave blank for all)"
        type: number
        required: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install playwright
          sudo apt-get install -y libasound2t64
          playwright install chromium --with-deps

      - name: Scrape full timetables
        run: |
          ROUND="${{ github.event.inputs.round }}"
          if [ -n "$ROUND" ]; then
            python tools/scraper/scrape_full_timetable.py --round "$ROUND"
          else
            python tools/scraper/scrape_full_timetable.py
          fi

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: update full timetables from btcc.net [skip ci]"
          file_pattern: data/calendar.json
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
