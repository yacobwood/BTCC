name: Send Test Notification

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Notification channel (news, race, qualifying, free_practice, results, weekend_preview, standings, podcasts)'
        required: true
      title:
        description: 'Notification title'
        required: true
      body:
        description: 'Notification body'
        required: true
      device_token:
        description: 'FCM device token'
        required: true
      data:
        description: 'Extra data JSON (optional), e.g. {"round":"1"}'
        required: false
        default: '{}'

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Install firebase-admin
        run: npm install firebase-admin

      - name: Send FCM notification (v1 API)
        run: |
          node - <<'EOF'
          const admin = require('./node_modules/firebase-admin');
          const serviceAccount = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT);
          admin.initializeApp({ credential: admin.credential.cert(serviceAccount) });
          const extraData = JSON.parse(process.env.EXTRA_DATA || '{}');
          admin.messaging().send({
            token: process.env.DEVICE_TOKEN,
            notification: { title: process.env.TITLE, body: process.env.BODY },
            android: { priority: 'high', notification: { channelId: process.env.CHANNEL } },
            apns: { payload: { aps: { sound: 'default' } } },
            data: { channel: process.env.CHANNEL, ...extraData },
          }).then(r => { console.log('Sent:', r); process.exit(0); })
            .catch(e => { console.error('Error:', e.message); process.exit(1); });
          EOF
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          DEVICE_TOKEN: ${{ inputs.device_token }}
          CHANNEL: ${{ inputs.channel }}
          TITLE: ${{ inputs.title }}
          BODY: ${{ inputs.body }}
          EXTRA_DATA: ${{ inputs.data }}
