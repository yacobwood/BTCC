name: Send Test Notification

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Notification channel (news, race, qualifying, free_practice, results, weekend_preview, standings, podcasts)'
        required: true
      title:
        description: 'Notification title'
        required: true
      body:
        description: 'Notification body'
        required: false
        default: ''
      device_token:
        description: 'FCM device token'
        required: true
      data:
        description: |
          Extra data JSON (optional). Deep-link targets:
            Round/calendar:  {"type":"round","round":"1"}
            News article:    {"type":"news","slug":"article-slug"}
            Results:         {"type":"results","round":"1","year":"2026","race":"1"}
            Podcasts:        {"type":"podcast"}
        required: false
        default: '{}'
      image_url:
        description: 'Image URL to show in the notification (optional)'
        required: false
        default: ''

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Install firebase-admin
        run: npm install firebase-admin@12

      - name: Debug secret
        run: |
          node -e "
            const j = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT);
            console.log('project_id:', j.project_id);
            console.log('client_email:', j.client_email);
            console.log('type:', j.type);
            console.log('private_key starts with:', j.private_key?.substring(0, 30));
            console.log('private_key ends with:', j.private_key?.slice(-30));
            console.log('private_key length:', j.private_key?.length);
            console.log('has newlines:', j.private_key?.includes('\\n'));
          "
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Send FCM notification (v1 API)
        run: |
          node - <<'EOF'
          const admin = require('./node_modules/firebase-admin');
          const raw = process.env.FIREBASE_SERVICE_ACCOUNT;
          console.log('SA length:', raw.length, 'starts with:', raw.substring(0, 5));
          const serviceAccount = JSON.parse(raw);
          console.log('Parsed project_id:', serviceAccount.project_id);
          admin.initializeApp({ credential: admin.credential.cert(serviceAccount) });
          console.log('EXTRA_DATA raw:', JSON.stringify(process.env.EXTRA_DATA));
          let extraData = {};
          try { extraData = JSON.parse(process.env.EXTRA_DATA || '{}'); } catch(e) { console.error('EXTRA_DATA parse failed:', e.message); }
          console.log('extraData parsed:', JSON.stringify(extraData));
          const imageUrl = process.env.IMAGE_URL || '';
          const body = process.env.BODY || '';
          const data = { channel: process.env.CHANNEL, title: process.env.TITLE, ...extraData };
          if (body) data.body = body;
          if (imageUrl) data.imageUrl = imageUrl;
          admin.messaging().send({
            token: process.env.DEVICE_TOKEN,
            android: { priority: 'high' },
            apns: { payload: { aps: { alert: { title: process.env.TITLE, body }, sound: 'default' } } },
            data,
          }).then(r => { console.log('Sent:', r); process.exit(0); })
            .catch(e => { console.error('Error:', e.message); console.error('Code:', e.code); console.error('Full:', JSON.stringify(e, Object.getOwnPropertyNames(e))); process.exit(1); });
          EOF
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          DEVICE_TOKEN: ${{ inputs.device_token }}
          CHANNEL: ${{ inputs.channel }}
          TITLE: ${{ inputs.title }}
          BODY: ${{ inputs.body }}
          EXTRA_DATA: ${{ inputs.data }}
          IMAGE_URL: ${{ inputs.image_url }}
