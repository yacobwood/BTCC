name: Send Test Notification

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Notification channel (news, race, qualifying, free_practice, results, weekend_preview, standings, podcasts)'
        required: true
      title:
        description: 'Notification title'
        required: true
      body:
        description: 'Notification body'
        required: true
      device_token:
        description: 'FCM device token'
        required: true

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Send FCM notification (v1 API)
        run: |
          npm install -g firebase-admin 2>/dev/null || true
          node - <<'EOF'
          const admin = require('firebase-admin');
          const serviceAccount = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT);
          admin.initializeApp({ credential: admin.credential.cert(serviceAccount) });
          admin.messaging().send({
            token: process.env.DEVICE_TOKEN,
            notification: { title: process.env.TITLE, body: process.env.BODY },
            android: { notification: { channelId: process.env.CHANNEL } },
            apns: { payload: { aps: { sound: 'default' } } },
            data: { channel: process.env.CHANNEL },
          }).then(r => { console.log('Sent:', r); process.exit(0); })
            .catch(e => { console.error('Error:', e); process.exit(1); });
          EOF
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          DEVICE_TOKEN: ${{ inputs.device_token }}
          CHANNEL: ${{ inputs.channel }}
          TITLE: ${{ inputs.title }}
          BODY: ${{ inputs.body }}
