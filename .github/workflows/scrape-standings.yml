name: Scrape BTCC Standings

on:
  schedule:
    # Run every 6 hours during race season (Apr–Oct).
    # Adjust or disable in the off-season.
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force scrape even outside the race season (for historical capture)"
        type: boolean
        default: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r scraper/requirements.txt
          # Ubuntu 24.04 renamed libasound2 → libasound2t64; install it first
          # so playwright's --with-deps resolves the virtual package correctly
          sudo apt-get install -y libasound2t64
          playwright install chromium --with-deps

      - name: Run scraper
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="--force"
          fi
          python scraper/scrape_standings.py $ARGS

      - name: Commit updated standings
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update standings [skip ci]"
          file_pattern: data/standings.json
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
