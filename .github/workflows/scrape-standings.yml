name: Scrape BTCC Standings

on:
  # Disabled — standings are now computed from scraped results by scrape-results.yml
  # which includes seconds/thirds podium counts. scrape_standings.py is kept for
  # reference but should not overwrite standings.json.
  workflow_dispatch:
    inputs:
      force:
        description: "Force scrape even outside the race season (for historical capture)"
        type: boolean
        default: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Check race weekend
        id: raceday
        run: python .github/scripts/is_race_weekend.py

      - name: Set up Python
        # Skip heavy setup on non-race-weekend high-frequency runs
        if: |
          github.event_name == 'workflow_dispatch' ||
          github.event.schedule == '0 */6 * * *' ||
          steps.raceday.outputs.is_race_weekend == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: |
          github.event_name == 'workflow_dispatch' ||
          github.event.schedule == '0 */6 * * *' ||
          steps.raceday.outputs.is_race_weekend == 'true'
        run: |
          pip install -r tools/scraper/requirements.txt
          # Ubuntu 24.04 renamed libasound2 → libasound2t64; install it first
          # so playwright's --with-deps resolves the virtual package correctly
          sudo apt-get install -y libasound2t64
          playwright install chromium --with-deps

      - name: Run scraper
        if: |
          github.event_name == 'workflow_dispatch' ||
          github.event.schedule == '0 */6 * * *' ||
          steps.raceday.outputs.is_race_weekend == 'true'
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="--force"
          fi
          python tools/scraper/scrape_standings.py $ARGS

      - name: Commit updated standings
        if: |
          github.event_name == 'workflow_dispatch' ||
          github.event.schedule == '0 */6 * * *' ||
          steps.raceday.outputs.is_race_weekend == 'true'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: update standings [skip ci]"
          file_pattern: data/standings.json
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
